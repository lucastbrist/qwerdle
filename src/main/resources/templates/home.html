<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <link rel="stylesheet" type="text/css" th:href="@{/css/style.css}" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qwerdle</title>
</head>
<body>
<div class="dashboard">
    <div class="dashboard-title">
        <img src="/img/qwerdle-title.svg" alt="QWERDLE" style="height: 40px;">
    </div>
    <div class="dashboard-buttons">
        <a th:href="@{/login}" class="btn btn-secondary" sec:authorize="isAnonymous()">🔑 Login</a>
        <a th:href="@{/register}" class="btn btn-secondary" sec:authorize="isAnonymous()">📝 Register</a>
        <a th:href="@{/profile}" class="btn btn-secondary" sec:authorize="isAuthenticated()">👤 Profile</a>
        <form th:action="@{/logout}" method="post" style="display: inline;" sec:authorize="isAuthenticated()">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" class="btn btn-secondary">🚪 Logout</button>
        </form>
    </div>
</div>

<div class="content">
    <div class="auth-container">
        <div style="margin-top: 2rem; display: flex; flex-direction: column; gap: 1rem;">
            <a th:href="@{/play}" class="btn btn-primary">🎲 Random Game</a>
            <a th:href="@{/play(daily=true)}" class="btn btn-secondary">📅 Word of the Day</a>
        </div>
    </div>
</div>
</body>
</html>
