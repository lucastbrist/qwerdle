<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <link rel="stylesheet" type="text/css" th:href="@{/css/style.css}" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - Qwerdle</title>
    <style>
        .profile-container {
            max-width: 600px;
            margin: 0 auto;
        }

        .profile-header {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            padding: 2rem;
            background-color: #1a1a1b;
            border: 1px solid #3a3a3c;
            border-radius: 8px;
            margin-bottom: 1.5rem;
        }

        .profile-avatar {
            width: 64px;
            height: 64px;
            background-color: #538d4e;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            font-weight: bold;
            flex-shrink: 0;
        }

        .profile-info h2 {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 0.25rem;
        }

        .profile-info p {
            color: #818384;
            font-size: 0.9rem;
        }

        .stats-section-title {
            font-size: 0.75rem;
            font-weight: bold;
            letter-spacing: 0.1rem;
            color: #818384;
            text-transform: uppercase;
            margin-bottom: 0.75rem;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .stat-card {
            background-color: #1a1a1b;
            border: 1px solid #3a3a3c;
            border-radius: 8px;
            padding: 1.25rem 1rem;
            text-align: center;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 0.25rem;
        }

        .stat-label {
            font-size: 0.75rem;
            color: #818384;
            text-transform: uppercase;
            letter-spacing: 0.05rem;
        }

        .stat-card.highlight .stat-value {
            color: #538d4e;
        }

        .win-bar-container {
            background-color: #1a1a1b;
            border: 1px solid #3a3a3c;
            border-radius: 8px;
            padding: 1.5rem;
        }

        .win-bar-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            color: #818384;
            margin-bottom: 0.5rem;
        }

        .win-bar-track {
            height: 8px;
            background-color: #3a3a3c;
            border-radius: 4px;
            overflow: hidden;
        }

        .win-bar-fill {
            height: 100%;
            background-color: #538d4e;
            border-radius: 4px;
            transition: width 0.6s ease;
        }
    </style>
</head>
<body>
<div class="dashboard">
    <div class="dashboard-title">QWERDLE</div>
    <div class="dashboard-buttons">
        <a th:href="@{/play}" class="btn btn-secondary">🎮 Play</a>
        <form th:action="@{/logout}" method="post" style="display: inline;">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" class="btn btn-secondary">🚪 Logout</button>
        </form>
    </div>
</div>

<div class="content">
    <div class="profile-container">

        <!-- Header -->
        <div class="profile-header">
            <div class="profile-avatar" th:text="${#strings.toUpperCase(#strings.substring(user.username, 0, 1))}">A</div>
            <div class="profile-info">
                <h2 th:text="${user.username}">Username</h2>
                <p th:text="${user.email}">email@example.com</p>
            </div>
        </div>

        <!-- Stats -->
        <div class="stats-section-title">Statistics</div>
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" th:text="${user.totalGames}">0</div>
                <div class="stat-label">Played</div>
            </div>
            <div class="stat-card highlight">
                <div class="stat-value" th:text="${user.gamesWon}">0</div>
                <div class="stat-label">Won</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" th:text="${user.gamesLost}">0</div>
                <div class="stat-label">Lost</div>
            </div>
            <div class="stat-card highlight">
                <div class="stat-value" th:text="${user.currentStreak}">0</div>
                <div class="stat-label">Streak</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" th:text="${user.maxStreak}">0</div>
                <div class="stat-label">Best Streak</div>
            </div>
            <div class="stat-card highlight">
                <div class="stat-value" th:text="${#numbers.formatDecimal(user.winRate, 1, 0)} + '%'">0%</div>
                <div class="stat-label">Win Rate</div>
            </div>
        </div>

        <!-- Win Rate Bar -->
        <div class="win-bar-container">
            <div class="win-bar-label">
                <span>Win Rate</span>
                <span th:text="${#numbers.formatDecimal(user.winRate, 1, 0)} + '%'">0%</span>
            </div>
            <div class="win-bar-track">
                <div class="win-bar-fill" th:style="'width: ' + ${user.winRate} + '%'"></div>
            </div>
        </div>

    </div>
</div>
</body>
</html>
