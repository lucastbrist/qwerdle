<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <link rel="stylesheet" type="text/css" th:href="@{/css/style.css}" />
    <meta charset="UTF-8">
    <title>Login - Qwerdle</title>
</head>
<body>
<div class="content">
    <div class="auth-container">
        <h1>QWERDLE</h1>

        <div th:if="${param.logout}" class="message message-success">
            You have been logged out successfully.
        </div>

        <div th:if="${param.error}" class="message message-error">
            Invalid username or password.
        </div>

        <div th:if="${message}" class="message message-success" th:text="${message}"></div>

        <form th:action="@{/login}" method="post">

            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required autofocus>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>

            <button type="submit" class="btn btn-primary">Login</button>
        </form>

        <p class="auth-link">
            Don't have an account? <a th:href="@{/register}">Register here</a>
        </p>
    </div>
</div>
</body>
</html>
